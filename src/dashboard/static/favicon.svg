<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark gray background box -->
  <rect width="64" height="64" rx="14" fill="#27272a"/>
  <!-- Antenna -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="2.8" fill="none" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Head -->
  <rect x="12" y="16" width="40" height="34" rx="9" fill="none" stroke="#fafafa" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="25" cy="32" r="5.5" fill="none" stroke="#fafafa" stroke-width="3"/>
  <circle cx="39" cy="32" r="5.5" fill="none" stroke="#fafafa" stroke-width="3"/>
  <!-- Mouth -->
  <line x1="23" y1="45" x2="41" y2="45" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
</svg>
