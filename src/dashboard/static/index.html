<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeBot AI — Dashboard</title>
  <link rel="stylesheet" href="style.css?v=8">
  <link rel="icon" href="favicon.svg?v=8" type="image/svg+xml">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <svg width="36" height="36" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                  <stop stop-color="#2F6BFF"/>
                  <stop offset="1" stop-color="#00D2FF"/>
                </linearGradient>
              </defs>
              <!-- Head -->
              <rect x="10" y="14" width="44" height="36" rx="9" fill="none" stroke="url(#lg)" stroke-width="3.5"/>
              <!-- Side tabs -->
              <rect x="3" y="24" width="6" height="14" rx="3" fill="none" stroke="url(#lg)" stroke-width="2.8"/>
              <rect x="55" y="24" width="6" height="14" rx="3" fill="none" stroke="url(#lg)" stroke-width="2.8"/>
              <!-- Prompt >_ -->
              <g fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M24 26 L33 32 L24 38"/>
                <path d="M37 39 H44"/>
              </g>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-name">CodeBot</span>
            <span class="logo-badge">AI</span>
          </div>
        </div>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Overview</span>
        <ul class="nav-links">
          <li>
            <a href="#sessions" class="nav-link active" data-section="sessions">
              <span class="nav-icon">&#x2630;</span>
              Sessions
            </a>
          </li>
          <li>
            <a href="#audit" class="nav-link" data-section="audit">
              <span class="nav-icon">&#x1F6E1;</span>
              Audit Trail
            </a>
          </li>
          <li>
            <a href="#metrics" class="nav-link" data-section="metrics">
              <span class="nav-icon">&#x2593;</span>
              Metrics
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <div id="health-status" class="health-pill">
          <span class="health-dot"></span>
          <span class="health-text">Connecting...</span>
        </div>
      </div>
    </nav>

    <main id="content">
      <!-- Sessions -->
      <section id="section-sessions" class="section active">
        <div class="section-header">
          <div>
            <h1>Sessions</h1>
            <p class="section-subtitle">Browse and inspect your CodeBot conversations</p>
          </div>
          <div class="header-stats" id="session-stats"></div>
        </div>
        <div id="sessions-list" class="card-grid"></div>
        <div id="session-detail" class="detail-panel" style="display:none"></div>
      </section>

      <!-- Audit -->
      <section id="section-audit" class="section">
        <div class="section-header">
          <div>
            <h1>Audit Trail</h1>
            <p class="section-subtitle">Cryptographically verified tool execution log</p>
          </div>
          <div class="header-actions">
            <button id="btn-verify" class="btn btn-primary">
              &#x2713; Verify Chain
            </button>
            <span id="verify-result" class="verify-badge"></span>
          </div>
        </div>
        <div id="audit-timeline" class="timeline-container"></div>
      </section>

      <!-- Metrics -->
      <section id="section-metrics" class="section">
        <div class="section-header">
          <div>
            <h1>Metrics</h1>
            <p class="section-subtitle">Usage analytics and performance overview</p>
          </div>
        </div>
        <div id="metrics-cards" class="stats-grid"></div>
        <div id="usage-chart" class="chart-panel"></div>
        <div id="tool-breakdown" class="breakdown-panel"></div>
      </section>
    </main>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
