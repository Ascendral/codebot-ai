name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Run doctor
        run: python -m codeagi doctor
      - name: Run repo eval fixture
        env:
          CODEAGI_RUNTIME_ROOT: ${{ runner.temp }}/codeagi-runtime
          CODEAGI_LONG_TERM_ROOT: ${{ runner.temp }}/codeagi-long-term
          CODEAGI_WORKSPACE_ROOT: ${{ runner.temp }}/codeagi-workspace
        run: python -m codeagi eval repo --fixture repo_search
